databaseChangeLog:
  - changeSet:
      id: 001-call-sessions
      author: ahmet
      changes:
        - createTable:
            tableName: call_sessions
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: call_sid
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: phone_number
                  type: VARCHAR(32)
                  constraints:
                    nullable: false
              - column:
                  name: started_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
              - column:
                  name: ended_at
                  type: TIMESTAMPTZ
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: ACTIVE
                  constraints:
                    nullable: false
              - column:
                  name: appliance_type
                  type: VARCHAR(50)
              - column:
                  name: appliance_symptoms
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
      rollback:
        - dropTable:
            tableName: call_sessions

  - changeSet:
      id: 002-conversation-messages
      author: ahmet
      changes:
        - createTable:
            tableName: conversation_messages
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: call_session_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_conversation_messages_session
                    references: call_sessions(id)
              - column:
                  name: turn_number
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: content
                  type: TEXT
              - column:
                  name: tool_name
                  type: VARCHAR(50)
              - column:
                  name: tool_input
                  type: JSONB
              - column:
                  name: tool_output
                  type: JSONB
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
        - createIndex:
            indexName: idx_conversation_messages_session_turn
            tableName: conversation_messages
            columns:
              - column:
                  name: call_session_id
              - column:
                  name: turn_number
      rollback:
        - dropTable:
            tableName: conversation_messages
