databaseChangeLog:

  - changeSet:
      id: 005-image-upload
      author: husrev
      changes:
        - createTable:
            tableName: image_upload
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints: { primaryKey: true, nullable: false }
              - column:
                  name: call_session_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_image_upload_session
                    references: call_sessions(id)
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints: { nullable: false }
              - column:
                  name: token
                  type: VARCHAR(64)
                  constraints: { nullable: false, unique: true }
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: PENDING
                  constraints: { nullable: false }
              - column:
                  name: image_path
                  type: VARCHAR(512)
              - column:
                  name: image_mime_type
                  type: VARCHAR(64)
              - column:
                  name: vision_result
                  type: JSONB
              - column:
                  name: vision_provider
                  type: VARCHAR(32)
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: NOW()
                  constraints: { nullable: false }
              - column:
                  name: updated_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: NOW()
                  constraints: { nullable: false }
              - column:
                  name: expires_at
                  type: TIMESTAMPTZ
                  constraints: { nullable: false }
        - createIndex:
            tableName: image_upload
            indexName: idx_image_upload_token
            columns: [{ column: { name: token } }]
        - createIndex:
            tableName: image_upload
            indexName: idx_image_upload_session
            columns: [{ column: { name: call_session_id } }]
      rollback:
        - dropTable: { tableName: image_upload }
